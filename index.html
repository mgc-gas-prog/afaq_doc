<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدخال بيانات المخازن - المحطات</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        .map-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-grow: 1; min-width: 400px; text-align: center; }
        canvas { border: 2px solid #ddd; background: #fff; border-radius: 8px; cursor: crosshair; max-width: 100%; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #219150; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #eee; padding: 15px; text-align: center; }
        th { background: var(--primary); color: white; }
        .instruction { color: #666; font-size: 0.85em; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>نظام إدخال وإدارة بيانات المخازن</h2>

    <div class="container">
        <div class="form-box">
            <h3>إضافة مخزن جديد</h3>
            
            <label>اسم المحطة</label>
            <select id="stationName">
                </select>

            <label>رقم أو اسم المخزن</label>
            <input type="text" id="storeId" placeholder="مثال: مخزن A1">

            <label>العرض (متر)</label>
            <input type="number" id="width" placeholder="0.00">

            <label>الطول (متر)</label>
            <input type="number" id="length" placeholder="0.00">

            <p class="instruction">💡 انقر على المخطط يساراً لتحديد موقع البدء قبل الإضافة.</p>
            <button onclick="addStore()">حفظ وإضافة للمخطط</button>
            <button onclick="clearData()" style="background:#e74c3c; margin-top:10px;">مسح كافة البيانات</button>
        </div>

        <div class="map-box">
            <h3>الرسم الافتراضي للموقع (المخطط)</h3>
            <canvas id="mapCanvas" width="700" height="450"></canvas>
        </div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>اسم المحطة</th>
                <th>اسم المخزن</th>
                <th>الأبعاد (طول × عرض)</th>
                <th>المساحة الإجمالية</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const stations = ["محطة المطار2", "محطة ناعور", "محطة الجامعه", "محطة طبربور", "محطة الحرية", "محطة المفرق1", "محطة الشيديه", "محطة إربد", "محطة بليلا", "محطة الزرقاء خو", "محطة الحزام1", "محطة الزرقاء", "محطة الطفيلة 2", "محطة صويلح", "محطة المركز الثقافي", "محطة جرش باب عمان", "محطة البقعة", "محطة ماركا البلد", "محطة الشميساني", "محطة القسطل", "محطة السرو 2", "محطة الجيزة", "محطة البيادر", "محطة القطرانه 1", "محطة العقبة (المطار)", "محطة وادي رم", "محطة مادبا1", "محطة النعيمه", "محطة الحصن 1", "محطة الحرة الزرقاء", "محطة عجلون", "محطة وادي صقرة", "محطة البحر الميت1", "محطة معان1", "محطة السلط"];

        const select = document.getElementById('stationName');
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        let lastClick = { x: 50, y: 50 };
        let savedStores = JSON.parse(localStorage.getItem('stores')) || [];

        // تعبئة قائمة المحطات
        stations.sort().forEach(s => {
            let opt = document.createElement('option');
            opt.value = s;
            opt.innerHTML = s;
            select.appendChild(opt);
        });

        // تحديد الموقع على الكانفاس
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            lastClick.x = e.clientX - rect.left;
            lastClick.y = e.clientY - rect.top;
            drawAll(); // إعادة رسم لتوضيح نقطة النقر
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(lastClick.x, lastClick.y, 4, 0, Math.PI*2); ctx.fill();
        });

        function addStore() {
            const station = document.getElementById('stationName').value;
            const id = document.getElementById('storeId').value;
            const w = parseFloat(document.getElementById('width').value);
            const l = parseFloat(document.getElementById('length').value);

            if(!id || !w || !l) { alert("يرجى إكمال البيانات"); return; }

            const newStore = { station, id, w, l, x: lastClick.x, y: lastClick.y, area: (w*l).toFixed(2) };
            savedStores.push(newStore);
            localStorage.setItem('stores', JSON.stringify(savedStores));
            
            drawAll();
            updateTable();
            document.getElementById('storeId').value = "";
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            savedStores.forEach(s => {
                ctx.fillStyle = "rgba(39, 174, 96, 0.3)";
                ctx.strokeStyle = "#27ae60";
                ctx.lineWidth = 2;
                ctx.fillRect(s.x, s.y, s.w * 5, s.l * 5); // مقياس رسم 1متر = 5 بكسل
                ctx.strokeRect(s.x, s.y, s.w * 5, s.l * 5);
                ctx.fillStyle = "#2c3e50";
                ctx.font = "12px Arial";
                ctx.fillText(s.id, s.x + 5, s.y + 15);
            });
        }

        function updateTable() {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = "";
            savedStores.forEach(s => {
                const row = `<tr><td>${s.station}</td><td>${s.id}</td><td>${s.l}م × ${s.w}م</td><td>${s.area} م²</td></tr>`;
                tbody.innerHTML += row;
            });
        }

        function clearData() {
            if(confirm("هل أنت متأكد من مسح جميع البيانات؟")) {
                localStorage.removeItem('stores');
                savedStores = [];
                drawAll();
                updateTable();
            }
        }

        // تحميل البيانات عند فتح الصفحة
        window.onload = () => { drawAll(); updateTable(); };
    </script>
</body>
</html>
