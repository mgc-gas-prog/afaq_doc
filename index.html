<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة المخازن المتكامل</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .map-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-grow: 1; text-align: center; }
        canvas { border: 2px solid #ddd; background: #fff; cursor: crosshair; max-width: 100%; border-radius: 5px; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .export-btn { background: #3498db; margin-top: 5px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">نظام إدخال بيانات المخازن (كافة المحطات)</h2>

    <div class="container">
        <div class="form-box">
            <h3>إضافة بيانات</h3>
            
            <label>بحث واختيار المحطة:</label>
            <input type="text" id="stationSearch" placeholder="اكتب اسم المحطة للبحث..." onkeyup="filterStations()">
            <select id="stationName" size="5">
                </select>

            <label>اسم/رقم المخزن:</label>
            <input type="text" id="storeId" placeholder="مثال: مخزن رقم 5">

            <label>العرض (متر):</label>
            <input type="number" id="width" placeholder="0.00">

            <label>الطول (متر):</label>
            <input type="number" id="length" placeholder="0.00">

            <button onclick="addStore()">إضافة للمخطط والجدول</button>
            <button class="export-btn" onclick="exportToExcel()">تصدير البيانات إلى Excel</button>
            <button onclick="clearData()" style="background:#e74c3c;">مسح الذاكرة</button>
        </div>

        <div class="map-box">
            <h3>المخطط الافتراضي للموقع</h3>
            <canvas id="mapCanvas" width="700" height="500"></canvas>
            <p style="font-size: 12px; color: #666;">* انقر على المربع الأبيض لتحديد زاوية المخزن قبل الضغط على "إضافة"</p>
        </div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>اسم المحطة</th>
                <th>المخزن</th>
                <th>الأبعاد</th>
                <th>المساحة (م²)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // كافة المحطات مستخرجة من ملفك
        const allStations = ["محطة المطار2", "محطة المطار1", "محطة ناعور", "محطة الجامعه", "محطة طبربور", "محطة الحرية", "محطة المفرق1", "محطة الشيديه", "محطة إربد", "محطة بليلا", "محطة الزرقاء خو", "محطة الحزام1", "محطة الزرقاء", "محطة الطفيلة 2", "محطة صويلح", "محطة المركز الثقافي", "محطة جرش باب عمان", "محطة البقعة", "محطة ماركا البلد", "محطة شارع عبد الله غوشة", "محطة الشميساني", "محطة شارع مكة", "محطة القسطل", "محطة السرو 2", "محطة الجيزة", "محطة البيادر", "محطة السرو 1", "محطة الجويده1", "محطة القطرانه 1", "محطة الخلفي", "محطة جرف الدراويش", "محطة العقبة (المطار)", "محطة وادي رم", "محطة شارع الشريف حسين", "محطة مادبا1", "محطة ماركا 1", "محطة جابر", "محطة النعيمه", "محطة ماركا 3", "محطة الطفيلة 1", "محطة الحصن 1", "محطة الحزام 2", "محطة اليادودة1", "محطة الحرة الزرقاء", "محطة الكرك/ الثنيه", "محطة الحصن 2", "محطة الشوبك", "محطة عجلون", "محطة القدس العربية", "محطة وادي صقرة", "محطة المشارع / الأغوار", "محطة البحر الميت2", "محطة وادي الرمم", "محطة البوتاس", "محطة البحر الميت1", "محطة الحزام 3", "محطة اليادودة2", "محطة الطنيب", "محطة معان1", "محطة المفرق2", "محطة الكرك الوسية", "محطة مؤتة", "محطة السوق المركزي", "محطة الجويدة2", "محطة القطرانة 2", "محطة الجبيهة1", "محطة بشرى", "محطة الرمثا 1", "محطة إيدون", "محطة الرصيفة", "محطة كوريدور عبدون", "محطة البيضاء", "محطة شارع الاردن", "محطة دير ابي سعيد", "محطة ضاحية الأمير علي", "محطة سحاب1", "محطة أم العمد", "محطة السلط"];

        const select = document.getElementById('stationName');
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        let lastClick = { x: 50, y: 50 };
        let stores = JSON.parse(localStorage.getItem('myStores')) || [];

        // تعبئة القائمة
        function populateStations(list) {
            select.innerHTML = "";
            list.sort().forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.text = s;
                select.appendChild(opt);
            });
        }

        // تصفية المحطات عند البحث
        function filterStations() {
            const val = document.getElementById('stationSearch').value.toLowerCase();
            const filtered = allStations.filter(s => s.includes(val));
            populateStations(filtered);
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            lastClick.x = e.clientX - rect.left;
            lastClick.y = e.clientY - rect.top;
            draw();
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(lastClick.x, lastClick.y, 4, 0, Math.PI*2); ctx.fill();
        });

        function addStore() {
            const st = select.value;
            const id = document.getElementById('storeId').value;
            const w = parseFloat(document.getElementById('width').value);
            const l = parseFloat(document.getElementById('length').value);

            if(!st || !id || !w || !l) return alert("يرجى اختيار المحطة وتعبئة الأبعاد");

            stores.push({ st, id, w, l, x: lastClick.x, y: lastClick.y });
            localStorage.setItem('myStores', JSON.stringify(stores));
            draw(); updateTable();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stores.forEach(s => {
                ctx.fillStyle = "rgba(46, 204, 113, 0.4)";
                ctx.strokeStyle = "#27ae60";
                ctx.fillRect(s.x, s.y, s.w * 4, s.l * 4); // مقياس 1م = 4بكسل
                ctx.strokeRect(s.x, s.y, s.w * 4, s.l * 4);
                ctx.fillStyle = "#000"; ctx.fillText(s.id, s.x + 2, s.y + 10);
            });
        }

        function updateTable() {
            const body = document.querySelector('#dataTable tbody');
            body.innerHTML = "";
            stores.forEach(s => {
                body.innerHTML += `<tr><td>${s.st}</td><td>${s.id}</td><td>${s.l}x${s.w}</td><td>${(s.l*s.w).toFixed(2)}</td></tr>`;
            });
        }

        function exportToExcel() {
            let csv = "\ufeffاسم المحطة,المخزن,الأبعاد,المساحة\n";
            stores.forEach(s => {
                csv += `${s.st},${s.id},${s.l}x${s.w},${s.l*s.w}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "بيانات_المخازن.csv";
            link.click();
        }

        function clearData() {
            if(confirm("سيتم حذف كل البيانات المسجلة، هل أنت متأكد؟")) {
                localStorage.clear(); stores = []; draw(); updateTable();
            }
        }

        window.onload = () => { populateStations(allStations); draw(); updateTable(); };
    </script>
</body>
</html>
