<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AFAQ_DOCS</title>
    <style>
        :root { --primary: #1a2a3a; --secondary: #27ae60; --accent: #e67e22; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px;color: #333; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; max-width: 1400px; margin: auto; }
        .form-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); width: 420px; border-top: 5px solid var(--primary); }
        .map-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); flex-grow: 1; text-align: center; }
        canvas { border: 1px solid #dfe6e9; background: #ffffff; border-radius: 10px; max-width: 100%; margin-top: 15px; }
        
        h2 { text-align:center; color: var(--primary); font-family: 'Arial Black', sans-serif; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; }
        label { display: block; margin-top: 12px; font-weight: 600; color: var(--primary); font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #dcdde1; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        
        .btn-add { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        .btn-new-station { background: var(--primary); color: white; border: none; cursor: pointer; font-size: 13px; }
        .btn-export { background: #3498db; color: white; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        #status { font-size: 13px; margin-top: 10px; color: #2980b9; font-weight: bold; text-align: center; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h2>AFAQ_DOCS</h2>

    <div class="container">
        <div class="form-box">
            <h3>📍 إعدادات المحطة</h3>
            
            <button class="btn-new-station" onclick="addNewStation()">+ إضافة اسم محطة غير مدرج</button>
            
            <label>البحث واختيار المحطة:</label>
            <input type="text" id="stationSearch" placeholder="اكتب للبحث في القائمة الجديدة..." onkeyup="filterStations()">
            <select id="stationName" size="6"></select>

            <label>عدد المخازن في الموقع:</label>
            <input type="number" id="storesCount" placeholder="إجمالي عدد المخازن" oninput="generateEmptyLayout()">

            <hr>
            <h3>📦 بيانات المخزن الحالي</h3>
            <label>ترتيب المخزن (رقم المربع):</label>
            <input type="number" id="storeOrder" placeholder="مثلاً: 1">

            <label>اسم/وصف المخزن:</label>
            <input type="text" id="storeId" placeholder="مثلاً: مخزن الكيماويات">

            <div class="flex-row">
                <div style="flex:1">
                    <label>العرض (متر):</label>
                    <input type="number" id="width" placeholder="0.00">
                </div>
                <div style="flex:1">
                    <label>الطول (متر):</label>
                    <input type="number" id="length" placeholder="0.00">
                </div>
            </div>

            <button class="btn-add" onclick="updateAndSend()">تحديث المخطط وحفظ البيانات 💾</button>
            <button class="btn-export" onclick="exportToExcel()">تصدير تقرير AFAQ_DOCS</button>
            <div id="status"></div>
        </div>

        <div class="map-box">
            <h3>🗺️ المخطط الهندسي الافتراضي للموقع</h3>
            <canvas id="mapCanvas" width="800" height="450"></canvas>
            <p style="color: #636e72; font-size: 13px; margin-top: 15px;">يتم ترتيب المخازن أفقياً مع كتابة الاسم والمساحة تلقائياً داخل كل وحدة</p>
        </div>
    </div>
