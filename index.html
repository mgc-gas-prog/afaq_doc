<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AFAQ_DOCS</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        .map-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-grow: 1; text-align: center; }
        canvas { border: 2px solid #ddd; background: #fff; border-radius: 8px; max-width: 100%; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .btn-add { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-new-station { background: var(--primary); color: white; border: none; cursor: pointer; margin-bottom: 15px; }
        .btn-export { background: #3498db; color: white; border: none; cursor: pointer; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #status { font-size: 13px; margin-top: 5px; color: #2980b9; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        h2 { text-align:center; color: var(--primary); font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h2>AFAQ_DOCS</h2>

    <div class="container">
        <div class="form-box">
            <h3>1. المحطة والموقع</h3>
            
            <button class="btn-new-station" onclick="addNewStation()">+ إضافة اسم محطة جديد</button>
            
            <label>بحث في المحطات:</label>
            <input type="text" id="stationSearch" placeholder="ابحث عن محطة..." onkeyup="filterStations()">
            <select id="stationName" size="5"></select>

            <label>إجمالي عدد المخازن في الموقع:</label>
            <input type="number" id="storesCount" placeholder="أدخل العدد الكلي للمخازن" oninput="generateEmptyLayout()">

            <hr>
            <h3>2. بيانات المخزن الحالي</h3>
            <label>ترتيب المخزن (رقم المربع من اليسار):</label>
            <input type="number" id="storeOrder" placeholder="مثلاً: 1">

            <label>اسم تعريف المخزن:</label>
            <input type="text" id="storeId" placeholder="مثال: مخزن المواد الأولية">

            <div style="display:flex; gap:10px;">
                <input type="number" id="width" placeholder="العرض (م)">
                <input type="number" id="length" placeholder="الطول (م)">
            </div>

            <button class="btn-add" onclick="updateAndSend()">تحديث المخطط والحفظ 💾</button>
            <button class="btn-export" style="margin-top:5px;" onclick="exportToExcel()">تصدير كملف Excel مؤقت</button>
            <div id="status"></div>
        </div>

        <div class="map-box">
            <h3>المخطط الافتراضي الأفقي</h3>
            <canvas id="mapCanvas" width="800" height="400"></canvas>
            <p style="color: #7f8c8d; font-size: 13px;">سيتم رسم المربعات بجانب بعضها بناءً على عدد المخازن</p>
        </div>
    </div>
